<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyTone Download Center</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --brand-red: #ef4444;
            --btn-bg: #1e293b;
            --card-border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部 Logo 与标语区 */
        .header {
            text-align: center;
            margin-top: 40px;
            padding: 0 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            margin-top: 0;
        }

        /* 🔍 核心：高逼格搜索框（产品再多也不怕） */
        .search-container {
            width: 90%;
            max-width: 500px;
            margin: 20px 0 40px 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 1px solid var(--card-border);
            border-radius: 30px;
            outline: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--text-main);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* 产品卡片网格布局 */
        .grid-container {
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding-bottom: 60px;
        }

        @media (min-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 单个产品卡片设计 */
        .product-card {
            background: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .product-info h3 {
            margin: 0 0 6px 0;
            font-size: 18px;
            font-weight: 600;
        }

        .product-info .tag {
            display: inline-block;
            font-size: 12px;
            background: #f1f5f9;
            color: var(--text-muted);
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        /* 极简双按钮设计 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            text-align: center;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 0;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .btn-manual {
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        .btn-manual:hover {
            background-color: #e2e8f0;
        }

        .btn-software {
            background-color: var(--btn-bg);
            color: #ffffff;
        }

        .btn-software:hover {
            background-color: #0f172a;
        }

        /* 无搜索结果时的提示 */
        .no-results {
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 40px 0;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>AnyTone</h1>
        <p>Firmware, Software & Manual Downloads</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search your radio model... (e.g. AT-5000)" onkeyup="filterProducts()">
    </div>

    <div class="grid-container" id="productGrid">
        
        <div class="product-card" data-model="at-5000 at5000 cb radio">
            <div class="product-info">
                <h3>AT-5000</h3>
                <span class="tag">Mobile CB Radio (SSB)</span>
            </div>
            <div class="btn-group">
                <a href="https://drive.google.com/file/d/1mOWQakwUzFuS_J4VYowgc1xTYnLBhSIk/view?usp=drive_link" class="btn btn-manual" target="_blank">📄 Manual</a>
                <a href="https://drive.google.com/file/d/1gB8qWF1le8a5RPOTvnVSn5jXx0XClJWY/view?usp=drive_link" class="btn btn-software" target="_blank">💻 Software</a>
            </div>
        </div>

        <div class="product-card" data-model="at-d168 d168 dmr handheld">
            <div class="product-info">
                <h3>AT-D168</h3>
                <span class="tag">DMR Handheld Radio</span>
            </div>
            <div class="btn-group">
                <a href="https://drive.google.com/file/d/1MQHK8v0mWQhafHdMMumvEkp2Qp8KyVcB/view?usp=drive_link" class="btn btn-manual" target="_blank">📄 Manual</a>
                <a href="https://drive.google.com/file/d/1zwPKg0ZGlB7P6mFy5TLcdtN9f5-GclRG/view?usp=drive_link" class="btn btn-software" target="_blank">💻 Software</a>
            </div>
        </div>

        <div class="product-card" data-model="at-518plus 518plus v5 gmrs frs">
            <div class="product-info">
                <h3>AT-518Plus (V5)</h3>
                <span class="tag">GMRS/FRS Handheld Radio</span>
            </div>
            <div class="btn-group">
                <a href="你的谷歌网盘518说明书链接" class="btn btn-manual" target="_blank">📄 Manual</a>
                <a href="你的谷歌网盘518写频软件链接" class="btn btn-software" target="_blank">💻 Software</a>
            </div>
        </div>

        <div class="no-results" id="noResults">No models found. Please check your spelling.</div>

    </div>

    <script>
        function filterProducts() {
            var input = document.getElementById('searchInput');
            var filter = input.value.toLowerCase();
            var grid = document.getElementById('productGrid');
            var cards = grid.getElementsByClassName('product-card');
            var noResults = document.getElementById('noResults');
            var hasVisibleCard = false;

            for (var i = 0; i < cards.length; i++) {
                var modelData = cards[i].getAttribute('data-model');
                if (modelData.indexOf(filter) > -1) {
                    cards[i].style.display = "flex";
                    hasVisibleCard = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            if (hasVisibleCard) {
                noResults.style.display = "none";
            } else {
                noResults.style.display = "block";
            }
        }
    </script>
</body>
</html>
